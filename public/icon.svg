<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16161a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <!-- Subtle glow behind icon -->
  <ellipse cx="512" cy="512" rx="320" ry="320" fill="url(#glowGrad)" opacity="0.6"/>

  <!-- Document shape -->
  <rect x="280" y="200" width="380" height="480" rx="24" ry="24" fill="#1a1a20" stroke="#6366f1" stroke-width="3" opacity="0.9"/>

  <!-- Folded corner -->
  <polygon points="580,200 660,280 660,280 580,280" fill="#0e0e10"/>
  <path d="M580 200 L660 280 L580 280 Z" fill="#2a2a35" stroke="#6366f1" stroke-width="2"/>

  <!-- Document lines -->
  <rect x="316" y="310" width="220" height="12" rx="6" fill="url(#accentGrad)" opacity="0.9"/>
  <rect x="316" y="346" width="280" height="10" rx="5" fill="#818cf8" opacity="0.5"/>
  <rect x="316" y="376" width="260" height="10" rx="5" fill="#818cf8" opacity="0.4"/>
  <rect x="316" y="406" width="240" height="10" rx="5" fill="#818cf8" opacity="0.35"/>
  <rect x="316" y="436" width="270" height="10" rx="5" fill="#818cf8" opacity="0.3"/>
  <rect x="316" y="466" width="200" height="10" rx="5" fill="#818cf8" opacity="0.25"/>

  <!-- Chain link icon below lines -->
  <g transform="translate(316, 510)" filter="url(#glow)">
    <!-- Link 1 -->
    <rect x="0" y="8" width="56" height="28" rx="14" fill="none" stroke="url(#accentGrad)" stroke-width="6"/>
    <!-- Link 2 -->
    <rect x="36" y="8" width="56" height="28" rx="14" fill="none" stroke="url(#accentGrad)" stroke-width="6"/>
    <!-- Cover gap -->
    <rect x="38" y="10" width="16" height="24" fill="#1a1a20"/>
  </g>

  <!-- "ON" monogram overlay (subtle) -->
  <text x="512" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" text-anchor="middle" fill="url(#accentGrad)" opacity="0.15" letter-spacing="8">ONCHAIN</text>
</svg>
