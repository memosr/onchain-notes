<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e10;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#111116;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8e8ed;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#c7c8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowRight" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e28;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16161e;stop-opacity:1" />
    </linearGradient>
    <filter id="docShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#6366f1" flood-opacity="0.25"/>
    </filter>
    <filter id="glowText">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Right side glow -->
  <rect x="600" y="0" width="600" height="630" fill="url(#glowRight)"/>

  <!-- Background grid dots (subtle) -->
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#818cf8"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="920" cy="315" r="220" fill="#6366f1" opacity="0.04"/>
  <circle cx="920" cy="315" r="160" fill="#6366f1" opacity="0.05"/>

  <!-- Document cards (right side) -->
  <!-- Back card -->
  <g transform="rotate(-8, 920, 315)" filter="url(#docShadow)">
    <rect x="760" y="140" width="300" height="380" rx="16" fill="#14141a" stroke="#6366f1" stroke-width="1" opacity="0.6"/>
    <rect x="784" y="180" width="160" height="10" rx="5" fill="#6366f1" opacity="0.3"/>
    <rect x="784" y="202" width="252" height="8" rx="4" fill="#818cf8" opacity="0.2"/>
    <rect x="784" y="218" width="228" height="8" rx="4" fill="#818cf8" opacity="0.18"/>
    <rect x="784" y="234" width="240" height="8" rx="4" fill="#818cf8" opacity="0.15"/>
  </g>

  <!-- Mid card -->
  <g transform="rotate(-2, 920, 315)" filter="url(#docShadow)">
    <rect x="780" y="120" width="300" height="380" rx="16" fill="#17171e" stroke="#6366f1" stroke-width="1.5" opacity="0.75"/>
    <rect x="804" y="162" width="180" height="10" rx="5" fill="#6366f1" opacity="0.45"/>
    <rect x="804" y="184" width="252" height="8" rx="4" fill="#818cf8" opacity="0.3"/>
    <rect x="804" y="200" width="228" height="8" rx="4" fill="#818cf8" opacity="0.25"/>
    <rect x="804" y="216" width="210" height="8" rx="4" fill="#818cf8" opacity="0.22"/>
    <rect x="804" y="232" width="240" height="8" rx="4" fill="#818cf8" opacity="0.2"/>
  </g>

  <!-- Front card (main) -->
  <g filter="url(#docShadow)">
    <rect x="800" y="100" width="300" height="390" rx="16" fill="url(#docGrad)" stroke="#6366f1" stroke-width="2"/>

    <!-- Card header -->
    <rect x="800" y="100" width="300" height="56" rx="16" fill="#1e1e2a"/>
    <rect x="800" y="132" width="300" height="24" fill="#1e1e2a"/>

    <!-- Dots -->
    <circle cx="828" cy="128" r="6" fill="#ff5f57"/>
    <circle cx="848" cy="128" r="6" fill="#ffbd2e"/>
    <circle cx="868" cy="128" r="6" fill="#28c840"/>

    <!-- Title line in card -->
    <rect x="824" y="178" width="140" height="12" rx="6" fill="url(#accentGrad)" opacity="0.9"/>

    <!-- Content lines -->
    <rect x="824" y="206" width="252" height="8" rx="4" fill="#818cf8" opacity="0.45"/>
    <rect x="824" y="222" width="228" height="8" rx="4" fill="#818cf8" opacity="0.38"/>
    <rect x="824" y="238" width="240" height="8" rx="4" fill="#818cf8" opacity="0.35"/>
    <rect x="824" y="254" width="200" height="8" rx="4" fill="#818cf8" opacity="0.3"/>
    <rect x="824" y="278" width="252" height="8" rx="4" fill="#818cf8" opacity="0.28"/>
    <rect x="824" y="294" width="180" height="8" rx="4" fill="#818cf8" opacity="0.25"/>
    <rect x="824" y="310" width="220" height="8" rx="4" fill="#818cf8" opacity="0.22"/>
    <rect x="824" y="326" width="190" height="8" rx="4" fill="#818cf8" opacity="0.2"/>

    <!-- Chain badge -->
    <rect x="824" y="358" width="110" height="30" rx="15" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1"/>
    <text x="879" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#818cf8">⛓ Base</text>
  </g>

  <!-- Left side content -->
  <!-- Eyebrow -->
  <rect x="80" y="200" width="6" height="32" rx="3" fill="url(#accentGrad)"/>
  <text x="100" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#818cf8" letter-spacing="3">ONCHAIN NOTES</text>

  <!-- Main title -->
  <text x="80" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#titleGrad)" letter-spacing="-2">Notes you</text>
  <text x="80" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#accentGrad)" letter-spacing="-2" filter="url(#glowText)">actually own.</text>

  <!-- Tagline -->
  <text x="80" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#9394a5" font-weight="400">Write. Store. Own. — permanently on Base mainnet.</text>

  <!-- CTA pill -->
  <rect x="80" y="490" width="200" height="48" rx="24" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1.5"/>
  <text x="180" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" text-anchor="middle" fill="#818cf8">Open Mini App</text>
</svg>
