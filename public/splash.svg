<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16161a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGrad)"/>

  <!-- Subtle glow -->
  <circle cx="100" cy="100" r="70" fill="#6366f1" opacity="0.06"/>

  <!-- Document shape -->
  <rect x="52" y="38" width="76" height="96" rx="6" ry="6" fill="#1a1a20" stroke="#6366f1" stroke-width="1.5" opacity="0.95"/>

  <!-- Folded corner -->
  <path d="M112 38 L128 54 L112 54 Z" fill="#2a2a35" stroke="#6366f1" stroke-width="1"/>
  <polygon points="112,38 128,54 112,54" fill="#0e0e10"/>
  <path d="M112 38 L128 54 L112 54 Z" fill="#22222c" stroke="#6366f1" stroke-width="1"/>

  <!-- Document lines -->
  <rect x="62" y="66" width="42" height="4" rx="2" fill="url(#accentGrad)"/>
  <rect x="62" y="76" width="56" height="3" rx="1.5" fill="#818cf8" opacity="0.5"/>
  <rect x="62" y="84" width="50" height="3" rx="1.5" fill="#818cf8" opacity="0.4"/>
  <rect x="62" y="92" width="52" height="3" rx="1.5" fill="#818cf8" opacity="0.35"/>
  <rect x="62" y="100" width="44" height="3" rx="1.5" fill="#818cf8" opacity="0.3"/>

  <!-- Chain link -->
  <g transform="translate(62, 112)" filter="url(#glow)">
    <rect x="0" y="2" width="20" height="10" rx="5" fill="none" stroke="url(#accentGrad)" stroke-width="2.5"/>
    <rect x="14" y="2" width="20" height="10" rx="5" fill="none" stroke="url(#accentGrad)" stroke-width="2.5"/>
    <rect x="15" y="3" width="5" height="8" fill="#1a1a20"/>
  </g>

  <!-- App name -->
  <text x="100" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#e8e8ed" letter-spacing="1">ONCHAIN</text>
  <text x="100" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="url(#accentGrad)" letter-spacing="1">NOTES</text>
</svg>
